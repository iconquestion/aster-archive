name: CI

permissions:
  contents: read

env:
  NODE_VERSION: 24.14.0

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'LICENSE-*'
      - 'CODE_OF_CONDUCT*'
      - 'CONTRIBUTING*'
      - 'SECURITY*'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'LICENSE-*'
      - 'CODE_OF_CONDUCT*'
      - 'CONTRIBUTING*'
      - 'SECURITY*'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check formatting
        run: npm run format:check

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup project
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare CI environment
        run: bash scripts/setup-ci-env.sh

      - name: Run tests
        run: npm test
