<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24 - Newspaper Subscription Desk</title>
</head>

<body>
  <div>
    <h1>24 - Newspaper Subscription Desk</h1>
    <p>你来到了一处安静得有些过头的报刊订阅台。</p>
    <p>这里似乎负责整理更新、播报变动，以及向外发布一些固定格式的内部新闻报刊。</p>
    <p>用地球语应该怎么说来着...部落格？</p>
    <p>哦！（神之一指）（每日深度求索）他可能是想说"订阅"，没关系，我来教他！XD</p>
    <p>我们现在都叫做"订阅"，不叫"部落格"，你太out了！</p>
    <button id="subscribe">点我订阅</button>
    <p id="result"></p>
    <details>
      <summary>Hint</summary>
      <p>你忽然想到，这里会不会有以前的订阅名单？名单上会不会有什么好东西呢~</p>
    </details>
  </div>
  <script>
    let subscribeButton = document.getElementById("subscribe");
    let resultParagraph = document.getElementById("result");

    subscribeButton.addEventListener("click", function () {
      resultParagraph.textContent = "这里早就废弃了，没什么好订阅的了喔！";
    });
  </script>
  <script src="/js/analytics.js"></script>
</body>

</html>
