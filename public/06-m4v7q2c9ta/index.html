<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/bootstrap/dist/css/bootstrap.css" />
    <link rel="stylesheet" href="/css/challenge-theme.css" />
    <title>06 - Here's your ID card</title>
  </head>

  <body class="challenge-page">
    <main class="page-shell container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
          <section class="card puzzle-card shadow-sm">
            <div class="card-body p-4 p-md-5 puzzle-copy">
              <h1 class="display-6 fw-bold mb-3">06 - Here's your ID card</h1>
              <p class="text-secondary mb-2">每个进入馆内的人，</p>
              <p class="text-secondary mb-2">都会收到一张ID卡片。</p>
              <p class="text-secondary mb-2">有人用它来区分身份，</p>
              <p class="text-secondary mb-0">也有人把它当作备忘。</p>

              <div class="action-stack mt-4">
                <div class="action-row">
                  <button
                    id="getmyidcard"
                    class="btn btn-primary"
                    type="button"
                  >
                    获取我的ID卡片
                  </button>
                </div>
                <p id="result" class="result-panel"></p>
              </div>

              <div class="hint-panel mt-4">
                <details>
                  <summary>Hint</summary>
                  <p class="mb-0">看看自己的ID卡片</p>
                </details>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script src="/js/get_json_response.js"></script>
    <script>
      get_json_response('getmyidcard', 'result', '/api/06?level=guest');
    </script>
    <script src="/js/analytics.js"></script>
  </body>
</html>
