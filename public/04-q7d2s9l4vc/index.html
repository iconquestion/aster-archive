<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/bootstrap/dist/css/bootstrap.css" />
    <link rel="stylesheet" href="/css/challenge-theme.css" />
    <title>04 - An echo from the past</title>
  </head>

  <body class="challenge-page">
    <main class="page-shell container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
          <section class="card puzzle-card shadow-sm">
            <div class="card-body p-4 p-md-5 puzzle-copy">
              <h1 class="display-6 fw-bold mb-3">04 - An echo from the past</h1>
              <p class="text-secondary mb-2">
                你终于穿过了大门，来到建筑之中。
              </p>
              <p class="text-secondary mb-2">呈现在你面前的，是偌大的天井。</p>
              <p class="text-secondary mb-2">
                你从未想象到，外面看起来只有六层高的古建筑，内部居然如此宽敞宏伟。
              </p>
              <p class="text-secondary mb-2">
                抬头望去，天井的顶部镶嵌着彩色的玻璃，经历时间的洗礼，仍透出一股不朽的古典美。
              </p>
              <p class="text-secondary mb-2">
                整个大厅看起来没有想象中那么黑，也许是天井的功劳。
              </p>
              <p class="text-secondary mb-2">
                天井的正下方，是一口大钟，也许是以前用来计时或者提醒的工具。
              </p>
              <p class="text-secondary mb-2">
                你也许对此不感兴趣，只想继续深入探索这座建筑。
              </p>
              <p class="text-secondary mb-2">
                但出乎意料的，无论你顺着哪个方向的走廊走下去，最终似乎都会回到原地。
              </p>
              <p class="text-secondary mb-2">看来你不得不想想办法。</p>
              <div class="action-stack mt-4">
                <div class="action-row">
                  <button id="getecho" class="btn btn-primary" type="button">
                    敲一下钟
                  </button>
                </div>
                <p id="echo" class="result-panel"></p>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script src="/js/get_json_response.js"></script>
    <script>
      get_json_response('getecho', 'echo', '/api/04');
    </script>
    <script src="/js/analytics.js"></script>
  </body>
</html>
