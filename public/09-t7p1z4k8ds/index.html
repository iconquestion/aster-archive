<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/bootstrap/dist/css/bootstrap.css" />
    <link rel="stylesheet" href="/css/challenge-theme.css" />
    <title>09 - Forgotten Death</title>
  </head>

  <body class="challenge-page">
    <main class="page-shell container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
          <section class="card puzzle-card shadow-sm">
            <div class="card-body p-4 p-md-5 puzzle-copy">
              <h1 class="display-6 fw-bold mb-3">09 - Forgotten Death</h1>
              <p class="text-secondary mb-2">你来到了一个带有花园的小房间。</p>
              <p class="text-secondary mb-2">
                这里安静得仿佛从未存在过任何事物。
              </p>
              <p class="text-secondary mb-2">
                你却隐约感觉，有什么曾经在此停留。
              </p>
              <p class="fst-italic text-secondary mb-0">
                真正的死亡，是再没有人记得它。
              </p>

              <div class="action-stack mt-4">
                <p class="text-secondary mb-0">
                  在下面可以体验30秒倒计时，感受时间的流逝
                </p>
                <div class="action-row">
                  <button
                    id="startBtn"
                    class="btn btn-outline-primary"
                    type="button"
                  >
                    点我开始
                  </button>
                  <span id="timer" class="badge text-bg-primary fs-6 px-3 py-2"
                    >30</span
                  >
                </div>
                <p id="hint" class="result-panel"></p>
              </div>

              <div class="hint-panel mt-4">
                <details>
                  <summary>Hint</summary>
                  <p class="mb-0">长江后浪推前浪...</p>
                </details>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script src="/js/09.countdown.v2.js"></script>
    <script src="/js/analytics.js"></script>
  </body>
</html>
