        <h1>09 - Forgotten Death</h1>
        <p>你走进一间带着小花园的纪念室。</p>
        <p>这里像被彻底清理过一轮，干净得有点可疑，</p>
        <p>仿佛上一任住客刚被系统一键归档，连存在感都被顺手清空了。</p>
        <cite>真正的死亡，是再没有人记得它。</cite>
        <p>角落里有个还在工作的旧计时器，版本号糊成一团，像是经历过几轮热更新又热回滚。</p>
        <p>你决定启动它，看看旧时代究竟把什么留在了“曾经”的那一层里。</p>
        <div>
            <p id="hint"></p>
            <button id="startBtn">
                点我开始
            </button>
            <p id="timer">30</p>
        </div>

        <details>
            <summary>Hint</summary>
            <p>新版本总说自己更好用，但老东西有时候才更诚实。</p>
        </details>
