      // 虽然当前脚本只会运行一遍，但保留这个开关能让逻辑更稳，也方便以后扩展。
      let consoleTrapArmed = false;

      // 入口拦截：静默拦掉最常见的开发者工具入口。
      // 这里监听的是整个 document 的 keydown 事件，也就是“按键刚按下去”的时机。
      // 之所以选 keydown，而不是 keyup，是因为 keydown 更早触发，适合提前阻止默认行为。
      function blockShortcuts(event) {
        // event.key 拿到当前按下的键名，例如 "F12"、"I"、"u"。
        // 统一转成小写后，后面的判断就不用同时兼容大小写了。
        const key = String(event.key || "").toLowerCase();

        // 这里列出几个最常见的开发者工具相关快捷键：
        // 1. F12：最直接的开发者工具入口
        // 2. Ctrl/Cmd + Shift + I/J/C：打开 DevTools、Console、Elements
        // 3. Ctrl/Cmd + U：查看页面源码
        //
        // event.ctrlKey / event.metaKey 用来同时兼容 Windows/Linux 和 macOS。
        // Windows/Linux 常用 Ctrl，macOS 常用 Command，对应 metaKey。
        const blocked =
          key === "f12" ||
          ((event.ctrlKey || event.metaKey) && event.shiftKey && ["i", "j", "c"].includes(key)) ||
          ((event.ctrlKey || event.metaKey) && key === "u");

        // 如果本次按键不在拦截名单里，就直接放行，不影响页面正常操作。
        if (blocked) {
          // preventDefault() 的作用是阻止浏览器执行这个按键本来的默认行为。
          // 例如按 F12 时，浏览器原本会尝试打开开发者工具；调用后就会被静默拦下。
          event.preventDefault();
        }
      }

      // 右键菜单通常也是“检查元素”的入口之一，所以这里顺手一起拦掉。
      // 监听 contextmenu 事件并阻止默认行为后，浏览器就不会弹出右键菜单。
      function blockContextMenu(event) {
        event.preventDefault();
      }

      // 控制台探针：某些浏览器在控制台展开对象时会触发 getter。
      // 这里利用这一点放一个很轻量的“探针”。

        const bait = new Image();

        // 在某些浏览器/开发者工具里，当控制台尝试展示这个对象时，会读取它的属性，

        Object.defineProperty(bait, "id", {
          get() {
            return "devtools-open";
          }

      document.addEventListener("keydown", blockShortcuts);
      document.addEventListener("contextmenu", blockContextMenu);

      armConsoleTrap();
