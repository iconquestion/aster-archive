      let consoleTrapArmed = false;

      // 入口拦截：静默拦掉最常见的开发者工具入口。
      // 这里监听的是整个 document 的 keydown 事件，也就是“按键刚按下去”的时机。
      // 之所以选 keydown，而不是 keyup，是因为 keydown 更早触发，适合提前阻止默认行为。
      function blockShortcuts(event) {
        // event.key 拿到当前按下的键名，例如 "F12"、"I"、"u"。
        // 统一转成小写后，后面的判断就不用同时兼容大小写了。
        const key = String(event.key || "").toLowerCase();

        // 这里列出几个最常见的开发者工具相关快捷键：
        // 1. F12：最直接的开发者工具入口
        // 2. Ctrl/Cmd + Shift + I/J/C：打开 DevTools、Console、Elements
        // 3. Ctrl/Cmd + U：查看页面源码
        //
        // event.ctrlKey / event.metaKey 用来同时兼容 Windows/Linux 和 macOS。
        // Windows/Linux 常用 Ctrl，macOS 常用 Command，对应 metaKey。
        const blocked =
          key === "f12" ||
          ((event.ctrlKey || event.metaKey) && event.shiftKey && ["i", "j", "c"].includes(key)) ||
          ((event.ctrlKey || event.metaKey) && key === "u");

        // 如果本次按键不在拦截名单里，就直接放行，不影响页面正常操作。
        if (blocked) {
          // preventDefault() 的作用是阻止浏览器执行这个按键本来的默认行为。
          // 例如按 F12 时，浏览器原本会尝试打开开发者工具；调用后就会被静默拦下。
          event.preventDefault();
        }
      }

      // 右键菜单通常也是“检查元素”的入口之一，所以这里顺手一起拦掉。
      // 监听 contextmenu 事件并阻止默认行为后，浏览器就不会弹出右键菜单。
      function blockContextMenu(event) {
        event.preventDefault();
      }

      // 一旦判断开发者工具已打开，立即清空 localStorage，并阻止后续再次写入。
      // 这里故意只触发一次，避免重复清空、重复打补丁或刷屏。
      function handleDevtoolsDetected(source) {
        if (secretStorageRevoked) {
          return;
        }
        secretStorageRevoked = true;

        try {
          localStorage.clear();

          // 页面后面还有异步解密写入逻辑，这里顺手封住 setItem，
          // 避免敏感数据在清空后又被重新写回 localStorage。
          Storage.prototype.setItem = function () { };
        } catch (error) {
          console.warn("[Security Office] 检测到开发者工具已打开，但清除存储时出现异常。", error);
        }

        console.warn(`[Security Office] 检测到开发者工具已打开（${source}），为保证数据安全，存储的机密已被清除。`);
      }

      // 当 DevTools 以侧边栏或底栏形式停靠时，窗口内外尺寸常会出现明显差值。
      function detectDevtoolsByViewportGap() {
        const widthGap = Math.abs(window.outerWidth - window.innerWidth);
        const heightGap = Math.abs(window.outerHeight - window.innerHeight);

        if (widthGap > 160 || heightGap > 160) {
          handleDevtoolsDetected("viewport-gap");
        }
      }

      // 控制台探针：某些浏览器在控制台展开对象时会触发 getter。
      // 这里利用这一点放一个很轻量的“探针”。
      function armConsoleTrap() {

        if (consoleTrapArmed) {
          return;
        }
        consoleTrapArmed = true;

        // 之所以用 Image()，只是为了拿到一个现成对象；并不依赖图片能力本身。
        const bait = new Image();

        // 在某些浏览器/开发者工具里，当控制台尝试展示这个对象时，会读取它的属性，
        // 从而触发这个 getter。很多反调试代码会在这里埋检测或干扰逻辑。
