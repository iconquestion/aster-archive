<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14 - YOU SHALL NOT PASS</title>
</head>

<body>
    <div>
        <h1>14 - YOU SHALL NOT PASS</h1>
        <p>你在沉重的书柜之后发现了一扇暗门，</p>
        <p>但这扇门无论如何都纹丝不动，</p>
        <p>仿佛与这个空间融为一体。</p>
        <p>一行小字写在不起眼的地方：</p>
        <p>无知的外乡人啊，这里不是你们应到之处。</p>
        <p>只有真正的主人，才知道进入的方法。</p>
        <br />
        <button id="try_to_open_the_door">尝试打开暗门</button>
        <p id="try_to_open_the_door_result"></p>
        <form id="login_form" action="#" hidden>
            <input type="text" placeholder="username" name="username" disabled>
            <input type="password" placeholder="password" name="password" disabled>
            <input type="submit" value="Login" disabled>
        </form>
        <p id="login_result"></p>
        <details>
            <summary>Hint</summary>
            <p>给出的script仅供参考。实际上这扇门只给了你一个form。快说谢谢门大人:)</p>
            <p>其实一开始连script都没有，但考虑到写fetch轮子太无聊了所以加上了这么一个()</p>
            <details>
                <summary>More Hint</summary>
                <p>你和?-???-????-urlencoded过一辈子去吧 :P</p>
            </details>
        </details>
    </div>
    <script src="/js/get_json_response.js"></script>
    <script>
        // 用户点击指定按钮超过threshold_cnt次后，展示登录表单
        let cnt = 0;
        const threshold_cnt = 5;

        let btn = document.getElementById("try_to_open_the_door");
        let result = document.getElementById("try_to_open_the_door_result");

        btn.addEventListener("click", function () {
            result.innerText = "";
            cnt++;

            if (cnt >= threshold_cnt) {
                result.innerText = "邦邦卡邦！暗门弹出了一个登录界面！";
                console.log("2077年居然还在用传统的B/S登录...呜哇...");

                btn.disabled = true;
                document.getElementById("login_form").hidden = false;
            } else {
                result.innerText = "门：请输入文本\n(其实这只是你自己的内心戏)";
                console.log("其实就是没有反应嘛...");
            }
        });

        // 处理登录表单提交事件
        let login_form = document.getElementById("login_form");
        let response_show_ele = document.getElementById("login_result");

        login_form.addEventListener("submit", async (e) => {
            e.preventDefault();
            try {
                const res = await fetch("/api/14/login", {
                    method: "post",
                    body: "username=" + encodeURIComponent(login_form.username.value) + "&password=" + encodeURIComponent(login_form.password.value),
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                });
                const data = await res.json();
                console.log(data);
                if (!data || !data.message) throw ("Invalid response.");

                response_show_ele.innerText = data.message;
            } catch (err) {
                let err_summary = "Sorry but we've encountered an issue. Please try again later.";
                response_show_ele.innerText = err_summary;
                console.log(err_summary);
                console.error(err);
            }
        })
    </script>
    <script src="/js/analytics.js"></script>
</body>

</html>
