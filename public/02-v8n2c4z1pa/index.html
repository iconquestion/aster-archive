<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/bootstrap/dist/css/bootstrap.css" />
    <link rel="stylesheet" href="/css/challenge-theme.css" />
    <link rel="stylesheet" type="text/css" href="/css/02.css" />
    <title>02 - The Key Is Key</title>
  </head>

  <body class="challenge-page">
    <main class="page-shell container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
          <section class="card puzzle-card shadow-sm">
            <div class="card-body p-4 p-md-5 puzzle-copy">
              <h1 class="display-6 fw-bold mb-3">02 - The Key Is Key</h1>
              <p class="text-secondary mb-2">
                经过不懈的努力，你在一片隐蔽的树丛中找到了一扇铁门。
              </p>
              <p class="text-secondary mb-2">
                斑驳的锈迹下，依稀可见那个年代独有的审美风格。
              </p>
              <p class="text-secondary mb-2">
                不出意外，一把厚重的铁锁稳稳地挂在门上。
              </p>
              <p class="text-secondary mb-2">
                可惜，你并不是开锁专家，你也没有携带精密而美妙的神秘开锁工具。
              </p>
              <p class="text-secondary mb-2">但别灰心，也许以后会有机会的。</p>
              <p class="text-secondary mb-2">
                你打算在周围进行探索，找寻可以用来进入建筑群的办法。
              </p>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script src="/js/analytics.js"></script>
  </body>
