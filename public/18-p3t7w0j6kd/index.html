<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18 - Dinner Time</title>
</head>

<body>
    <div>
        <h1>18 - Dinner Time</h1>
        <p>晚饭时间到了，你面前摆着一条长得离谱的面包。</p>
        <p>管理这间餐厅的人非常抠门，</p>
        <p>坚持认为“文明取餐”就该先说明你到底要吃哪一小段，</p>
        <p>一旦开口就是“整条都给我”，他就会当场露出一种看暴食怪的表情。</p>
        <p>你要从哪里开始吃起？:D</p>
        <button id="get_left">左边!</button>
        <button id="get_middle">中间!</button>
        <button id="get_right">右边!</button>
        <p id="response"></p>
        <details>
            <summary>Hint</summary>
            <p>重点不是选左中右，而是你得学会怎么按“片段”开口。</p>
        </details>
    </div>
    <script src="/js/get_json_response.js"></script>
    <script>
        get_json_response("get_left", "response", "/api/18?food=left");
        get_json_response("get_middle", "response", "/api/18?food=middle");
        get_json_response("get_right", "response", "/api/18?food=right");
    </script>
    <script src="/js/analytics.js"></script>
</body>

</html>
