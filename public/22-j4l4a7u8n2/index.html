<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/bootstrap/dist/css/bootstrap.css" />
    <link rel="stylesheet" href="/css/challenge-theme.css" />
    <title>22 - International Guest Room</title>
  </head>

  <body class="challenge-page">
    <main class="page-shell container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
          <section class="card puzzle-card shadow-sm">
            <div class="card-body p-4 p-md-5 puzzle-copy">
              <h1 class="display-6 fw-bold mb-3">22 - International Guest Room</h1>
              <p class="text-secondary mb-2">
                一间高端大气上档次（也许）的国际宾客厅！
              </p>
              <p class="text-secondary mb-2">
                不过由于年代久远，只有一股浓浓的霉味和沉闷的回声。
              </p>
              <p class="text-secondary mb-0">
                你发现了一台电脑，并尝试启动它。
              </p>

              <div class="action-stack mt-4">
                <div class="action-row">
                  <button id="start_pc" class="btn btn-primary" type="button">
                    启动电脑
                  </button>
                </div>
                <p id="pc_output" class="result-panel"></p>
              </div>

              <div class="hint-panel mt-4">
                <details>
                  <summary>Hint</summary>
                  <p class="mb-0">国际人，国际化(话)。</p>
                </details>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script src="/js/get_json_response.js"></script>
    <script>
      get_json_response('start_pc', 'pc_output', '/api/22');
    </script>
    <script src="/js/analytics.js"></script>
  </body>
</html>
