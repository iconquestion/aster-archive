<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/bootstrap/dist/css/bootstrap.css" />
    <link rel="stylesheet" href="/css/challenge-theme.css" />
    <title>07 - Less Is More</title>
  </head>

  <body class="challenge-page">
    <main class="page-shell container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
          <section class="card puzzle-card shadow-sm">
            <div class="card-body p-4 p-md-5 puzzle-copy">
              <h1 class="display-6 fw-bold mb-3">07 - Less Is More</h1>
              <p class="text-secondary mb-2">
                随着一阵制作卡片的咔咔哒哒声，你获得了一张经理的ID卡！
              </p>
              <p class="text-secondary mb-2">这何尝不是一种出金呢？</p>
              <p class="text-secondary mb-2">
                但从目前来看，好像没有什么用场。
              </p>
              <p class="text-secondary mb-2">
                机器还给出了一份新员工的地图导览，但似乎和你手里的地图是完全一样的。
              </p>
              <p class="text-secondary mb-0">
                在屏幕上选择一个位置，就会跳到相应位置的简介，十分贴心。
              </p>
              <p class="text-secondary mb-0">那么，接下来是...？</p>

              <div class="action-stack mt-4">
                <div class="action-row">
                  <button
                    id="visit_grand_reading_hall"
                    class="btn btn-outline-primary"
                    type="button"
                  >
                    主览大厅
                  </button>
                  <button
                    id="visit_archive_room"
                    class="btn btn-outline-primary"
                    type="button"
                  >
                    公共档案区
                  </button>
                  <button
                    id="visit_exhibit_corridor"
                    class="btn btn-outline-primary"
                    type="button"
                  >
                    展示长廊
                  </button>
                </div>
                <p id="result" class="result-panel"></p>
              </div>

              <div class="hint-panel mt-4">
                <details>
                  <summary>Hint</summary>
                  <p class="mb-0">就这些地方了吗?有点无趣呢...</p>
                </details>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script src="/js/get_json_response.js"></script>
    <script>
      get_json_response(
        'visit_grand_reading_hall',
        'result',
        '/api/07?location=visit_grand_reading_hall'
      );
      get_json_response(
        'visit_archive_room',
        'result',
        '/api/07?location=visit_archive_room'
      );
      get_json_response(
        'visit_exhibit_corridor',
        'result',
        '/api/07?location=visit_exhibit_corridor'
      );

      // 更多区域正在开发中...
    </script>
    <script src="/js/analytics.js"></script>
  </body>
</html>
