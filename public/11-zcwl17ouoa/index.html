<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>11 - Weird Book</title>
</head>

<body>
  <div>
    <h1>11 - A Weird Book</h1>
    <p>你捡到一本封皮极其正经、内容却明显不太对劲的怪书。</p>
    <p>翻开前两页还像馆藏文献，越往后越像某种加密接头暗号，</p>
    <p>气质介于“神秘仪式手册”和“抽象饭圈黑话大全”之间。</p>
    <p>有人显然不想把话明着写出来，但又忍不住想留点线索，属实是又菜又爱藏。</p>
    <button id="openbook">翻开书</button>
    <button id="closebook">合上书</button>
    <p id="content"></p>
    <details>
      <summary>Hint</summary>
      <p>https://cyberchef.org/</p>
      <p>这玩意儿看着像文字，读起来却更像一种编码。</p>
      <p>答案格式: flags-12-xxxxxxxxxx</p>
    </details>
  </div>
  <script>
    document.getElementById("openbook").addEventListener("click", () => {
      let content_ele = document.getElementById("content");
      content_ele.textContent = "和谐公正和谐民主和谐平等和谐法治和谐自由公正自由和谐和谐和谐自由和谐公正和谐文明和谐平等和谐自由和谐平等和谐文明和谐和谐和谐公正和谐自由公正平等和谐和谐和谐文明和谐平等和谐民主和谐法治和谐爱国和谐公正和谐和谐和谐平等和谐和谐和谐和谐和谐富强和谐法治和谐敬业和谐自由公正自由和谐平等和谐和谐和谐和谐和谐民主和谐公正公正自由和谐公正和谐自由和谐自由和谐法治和谐和谐和谐平等和谐和谐和谐平等和谐公正和谐和谐和谐法治和谐法治和谐和谐公正自由和谐和谐公正自由";
    })

    document.getElementById("closebook").addEventListener("click", () => {
      let content_ele = document.getElementById("content");
      content_ele.textContent = "";
    })
  </script>
  <script src="/js/analytics.js"></script>
</body>

</html>
